name: Tests

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v
