services:
  # ── ngrok tunnel ──────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    command: http bot:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"          # ngrok dashboard
    restart: unless-stopped

  # ── finance bot ───────────────────────────────────────────────
  bot:
    build: .
    entrypoint: ["sh", "/app/entrypoint.sh"]
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/finance.db
      LOG_DIR: /app/logs
      HOST: "0.0.0.0"
      PORT: "8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - ngrok
    restart: unless-stopped

  # ── scheduled restart every 6 hours ──────────────────────────
  restart-scheduler:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        BOT=$(docker ps -qf "label=com.docker.compose.service=bot" | head -1)
        echo "0 */6 * * * docker restart $${BOT}" | crontab -
        crond -f -l 2
    depends_on:
      - bot
    restart: unless-stopped
